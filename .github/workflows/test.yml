# PR / main push 시 자동 검증
#
# 책임:
#   - api/, rag_core/, infra/ 변경 시 ruff + pytest
#   - web/ 변경 시 npm typecheck + lint + build
# 외부 비용 없음 (LLM 호출 모킹). OPENAI_API_KEY 는 테스트가 LLM 을 호출하는 일부 케이스에 한해 더미.
name: test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-test:
    name: api (pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]" || pip install -e ".[dev]" || pip install -e .

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Test (pytest)
        env:
          # 테스트는 FakeListLLM / 더미 키로 동작해야 한다 (실제 호출 금지).
          OPENAI_API_KEY: sk-dummy-for-tests
        run: pytest -q

  web-typecheck:
    name: web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # Lint 는 시연 후 ESLint flat config 로 마이그레이션 후 재활성:
      #   cd web && npx @next/codemod@canary next-lint-to-eslint-cli .
      # next lint 가 Next.js 16 에서 제거됨 + CI 에서 인터랙티브 prompt 로 hang.

      - name: Build
        env:
          # 빌드 단계엔 API 호출 없음 — placeholder 만 주입
          NEXT_PUBLIC_API_BASE: https://placeholder.invalid
        run: npm run build
